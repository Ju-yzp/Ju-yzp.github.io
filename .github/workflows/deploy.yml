name: Hexo Deploy

on:
  push:
    branches:
      - main # 源码分支

# 核心：必须赋予 Actions 写入 Pages 的权限
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24' # 顺手升级到 Node 24 消除警告
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build
        run: |
          npx hexo clean
          npx hexo g # 生成静态文件

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public # 告诉 GitHub 上传这个文件夹

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # 真正的部署步骤